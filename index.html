<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Code Editor Pro | Live Code Runner</title>
    
    <!-- Monaco Editor CSS + Loader -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #1e1e1e;
            color: #cccccc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .title-bar {
            background: #323233;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #3e3e42;
            flex-shrink: 0;
        }
        .title-bar h2 { font-size: 14px; font-weight: 500; }
        .title-bar h2 i { color: #007acc; margin-right: 8px; }
        .window-controls { display: flex; gap: 6px; }
        .window-controls button {
            background: transparent;
            border: none;
            color: #cccccc;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .window-controls button:hover { background: #3e3e42; }

        .toolbar {
            background: #2d2d30;
            padding: 5px 12px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            border-bottom: 1px solid #3e3e42;
            flex-shrink: 0;
        }
        .toolbar-btn {
            background: transparent;
            border: none;
            color: #e0e0e0;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 5px;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            transition: all 0.15s;
        }
        .toolbar-btn:hover { background: #3e3e42; }
        .separator { width: 1px; background: #3e3e42; margin: 0 6px; }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #bbbbbb;
            border-bottom: 1px solid #2d2d30;
        }
        .file-explorer {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .file-tree { list-style: none; }
        .file-item {
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 5px;
            margin: 2px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            transition: background 0.1s;
        }
        .file-item:hover { background: #2a2d2e; }
        .file-item.active { background: #094771; color: white; }
        .file-item i { width: 18px; }
        .fa-html5 { color: #e44d26; }
        .fa-css3-alt { color: #264de4; }
        .fa-js { color: #f7df1e; }
        .file-item.active i { color: white; }

        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .editor-tabs {
            background: #252526;
            display: flex;
            padding: 0 6px;
            border-bottom: 1px solid #3e3e42;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .tab {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2d2d30;
            border-right: 1px solid #3e3e42;
            white-space: nowrap;
        }
        .tab.active {
            background: #1e1e1e;
            border-top: 2px solid #007acc;
            color: white;
        }
        .tab:hover { background: #3e3e42; }
        .close-tab {
            margin-left: 10px;
            font-weight: bold;
            opacity: 0.6;
            font-size: 16px;
        }
        .close-tab:hover { opacity: 1; color: #ff7b72; }
        #editor-container { flex: 1; overflow: hidden; }

        .bottom-panel {
            background: #1e1e1e;
            border-top: 1px solid #3e3e42;
            height: 240px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .panel-header {
            background: #252526;
            padding: 5px 16px;
            display: flex;
            gap: 24px;
            border-bottom: 1px solid #3e3e42;
        }
        .panel-tab {
            padding: 6px 0;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
        }
        .panel-tab.active { border-bottom-color: #007acc; color: white; }
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            font-family: 'Courier New', monospace;
            font-size: 12.5px;
            background: #1e1e1e;
        }
        #console-output { color: #d4d4d4; line-height: 1.5; }
        .console-line { padding: 3px 0; border-bottom: 1px solid #2d2d30; white-space: pre-wrap; font-family: monospace; }
        .console-log { color: #9cdcfe; }
        .console-error { color: #f48771; background: #2a0f0f; border-left: 3px solid #f48771; padding-left: 8px; }
        .console-warn { color: #cca700; background: #2a2410; border-left: 3px solid #cca700; padding-left: 8px; }
        .preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            border-radius: 4px;
        }
        .status-bar {
            background: #007acc;
            color: white;
            padding: 4px 18px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 500;
            flex-shrink: 0;
        }
        .status-item { display: flex; align-items: center; gap: 6px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(2px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #2d2d30;
            border-radius: 12px;
            padding: 28px;
            min-width: 420px;
            border: 1px solid #3e3e42;
        }
        .modal-header { font-size: 20px; margin-bottom: 20px; color: white; }
        .modal-input {
            width: 100%;
            padding: 12px;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #f0f0f0;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        .modal-btn.primary { background: #007acc; color: white; }
        .modal-btn.secondary { background: #3e3e42; color: white; }
        ::-webkit-scrollbar { width: 10px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #424242; border-radius: 6px; }
    </style>
</head>
<body>

<div class="title-bar">
    <h2><i class="fas fa-play-circle"></i> Code Editor Pro · Live Runner</h2>
    <div class="window-controls">
        <button onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
        <button onclick="showSettings()"><i class="fas fa-cog"></i></button>
    </div>
</div>

<div class="toolbar">
    <button class="toolbar-btn" onclick="newFile()"><i class="fas fa-file"></i> New</button>
    <button class="toolbar-btn" onclick="openFile()"><i class="fas fa-folder-open"></i> Open</button>
    <button class="toolbar-btn" onclick="saveFile()"><i class="fas fa-save"></i> Save</button>
    <button class="toolbar-btn" onclick="saveAllFiles()"><i class="fas fa-copy"></i> Save All</button>
    <div class="separator"></div>
    <button class="toolbar-btn" id="runBtn" onclick="runCode()"><i class="fas fa-play"></i> Run Code</button>
    <button class="toolbar-btn" onclick="formatCode()"><i class="fas fa-align-left"></i> Format</button>
    <button class="toolbar-btn" onclick="toggleConsolePanel()"><i class="fas fa-terminal"></i> Toggle Console</button>
    <div class="separator"></div>
    <button class="toolbar-btn" onclick="pushToGitHub()"><i class="fab fa-github"></i> Push</button>
    <button class="toolbar-btn" onclick="cloneFromGitHub()"><i class="fas fa-cloud-download-alt"></i> Clone</button>
</div>

<div class="main-container">
    <div class="sidebar">
        <div class="sidebar-header"><i class="fas fa-folder-tree"></i> EXPLORER</div>
        <div class="file-explorer">
            <ul class="file-tree" id="fileTree"></ul>
        </div>
    </div>

    <div class="editor-area">
        <div class="editor-tabs" id="editorTabs"></div>
        <div id="editor-container"></div>
    </div>
</div>

<div class="bottom-panel" id="bottomPanel">
    <div class="panel-header">
        <div class="panel-tab active" data-panel="console" onclick="switchPanel('console')">📟 CONSOLE</div>
        <div class="panel-tab" data-panel="output" onclick="switchPanel('output')">🖥️ LIVE PREVIEW</div>
        <div class="panel-tab" data-panel="problems" onclick="switchPanel('problems')">⚠️ PROBLEMS</div>
    </div>
    <div class="panel-content" id="panelContent">
        <div id="console-output">✨ Ready. Click ▶️ Run Code to execute HTML/CSS/JS →</div>
    </div>
</div>

<div class="status-bar">
    <div class="status-item"><i class="fas fa-code-branch"></i> main</div>
    <div class="status-item"><span id="cursorPosition">Ln 1, Col 1</span></div>
    <div class="status-item"><i class="fas fa-check-circle"></i> Ready</div>
</div>

<div class="modal" id="githubModal">
    <div class="modal-content">
        <div class="modal-header" id="modalTitle">GitHub Action</div>
        <input type="text" class="modal-input" id="repoUrl" placeholder="Repository URL or name">
        <input type="text" class="modal-input" id="commitMessage" placeholder="Commit message (optional)">
        <div class="modal-buttons">
            <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
            <button class="modal-btn primary" onclick="performGitHubAction()">Confirm</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
    // ---------- GLOBAL STATE ----------
    let editor = null;
    let currentFile = 'index.html';
    let monacoReady = false;
    
    // Master files storage
    const files = {
        'index.html': {
            name: 'index.html',
            language: 'html',
            content: `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Preview</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>✨ Code Runner Active</h1>
        <p>Click the button to test JavaScript & Console</p>
        <button id="testBtn">Click Me</button>
        <p id="message"></p>
    </div>
    <script src="script.js"><\/script>
</body>
</html>`
        },
        'styles.css': {
            name: 'styles.css',
            language: 'css',
            content: `* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Segoe UI', system-ui;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.container {
    background: white;
    padding: 40px;
    border-radius: 24px;
    box-shadow: 0 25px 45px rgba(0,0,0,0.3);
    text-align: center;
    max-width: 500px;
}
h1 { color: #333; margin-bottom: 12px; }
p { color: #555; margin-bottom: 20px; }
button {
    background: #667eea;
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 40px;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
}
button:hover { transform: scale(1.02); background: #5a67d8; }
#message {
    margin-top: 20px;
    font-weight: bold;
    color: #667eea;
}`
        },
        'script.js': {
            name: 'script.js',
            language: 'javascript',
            content: `// Live JavaScript Runner
console.log("✅ Script loaded! Interactive preview ready.");

document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('testBtn');
    const msgDiv = document.getElementById('message');
    
    if (btn) {
        btn.addEventListener('click', () => {
            msgDiv.textContent = "🎉 Button clicked! Console log triggered.";
            console.log("Button clicked from live preview!");
        });
    }
    
    console.log("DOM fully loaded. Try editing styles or HTML and hit Run!");
});

// Demo calculator
window.demoCalc = {
    add: (a,b) => a + b,
    multiply: (a,b) => a * b
};
console.log("Utility available: window.demoCalc.add(5,3)");`
        }
    };

    // Helper: Refresh file tree + tabs UI
    function refreshUI() {
        const treeContainer = document.getElementById('fileTree');
        treeContainer.innerHTML = '';
        Object.keys(files).forEach(fname => {
            const ext = fname.split('.').pop();
            let iconClass = 'fas fa-file-code';
            if (ext === 'html') iconClass = 'fab fa-html5';
            else if (ext === 'css') iconClass = 'fab fa-css3-alt';
            else if (ext === 'js') iconClass = 'fab fa-js';
            const li = document.createElement('li');
            li.className = `file-item ${currentFile === fname ? 'active' : ''}`;
            li.setAttribute('data-filename', fname);
            li.innerHTML = `<i class="${iconClass}"></i> ${fname}`;
            li.onclick = (e) => { e.stopPropagation(); switchToFile(fname); };
            treeContainer.appendChild(li);
        });

        const tabsContainer = document.getElementById('editorTabs');
        tabsContainer.innerHTML = '';
        Object.keys(files).forEach(fname => {
            const ext = fname.split('.').pop();
            let iconClass = 'fab fa-html5';
            if (ext === 'css') iconClass = 'fab fa-css3-alt';
            else if (ext === 'js') iconClass = 'fab fa-js';
            else iconClass = 'fas fa-code';
            const tabDiv = document.createElement('div');
            tabDiv.className = `tab ${currentFile === fname ? 'active' : ''}`;
            tabDiv.setAttribute('data-file', fname);
            tabDiv.innerHTML = `<i class="${iconClass}"></i> ${fname}<span class="close-tab" data-filename="${fname}">✕</span>`;
            tabDiv.onclick = (e) => { if(e.target.classList?.contains('close-tab')) return; switchToFile(fname); };
            const closeSpan = tabDiv.querySelector('.close-tab');
            closeSpan.onclick = (e) => { e.stopPropagation(); closeTabHandler(fname); };
            tabsContainer.appendChild(tabDiv);
        });
    }

    function closeTabHandler(filename) {
        if (Object.keys(files).length === 1) {
            addConsoleMessage('warn', ['Cannot close the only file. Create a new file first.']);
            return;
        }
        delete files[filename];
        if (currentFile === filename) {
            const remaining = Object.keys(files)[0];
            if (remaining) switchToFile(remaining);
        }
        refreshUI();
        if (editor && monacoReady && currentFile && files[currentFile]) {
            const model = editor.getModel();
            monaco.editor.setModelLanguage(model, files[currentFile].language);
            editor.setValue(files[currentFile].content);
        }
        addConsoleMessage('log', [`Closed ${filename}`]);
    }

    function switchToFile(filename) {
        if (!files[filename]) return;
        if (editor && monacoReady) {
            files[currentFile].content = editor.getValue();
            currentFile = filename;
            const targetFile = files[filename];
            const model = editor.getModel();
            monaco.editor.setModelLanguage(model, targetFile.language);
            editor.setValue(targetFile.content);
        } else {
            currentFile = filename;
        }
        refreshUI();
        updateCursorPosition();
    }

    function saveFile() {
        if (editor) files[currentFile].content = editor.getValue();
        const blob = new Blob([files[currentFile].content], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = currentFile;
        link.click();
        URL.revokeObjectURL(link.href);
        addConsoleMessage('log', [`✅ Saved ${currentFile}`]);
    }

    function saveAllFiles() {
        if (editor) files[currentFile].content = editor.getValue();
        addConsoleMessage('log', ['📁 All files synced in memory']);
    }

    function newFile() {
        let fname = prompt('Enter filename (e.g., app.js, style.css):', 'newfile.js');
        if (!fname) return;
        if (files[fname]) { addConsoleMessage('error', ['File already exists!']); return; }
        const ext = fname.split('.').pop();
        let lang = 'plaintext';
        let initContent = '';
        if (ext === 'html') { lang = 'html'; initContent = '<!-- New HTML -->\n<h1>Hello World</h1>'; }
        else if (ext === 'css') { lang = 'css'; initContent = '/* New styles */\nbody { background: #1e1e1e; }'; }
        else if (ext === 'js') { lang = 'javascript'; initContent = '// New script\nconsole.log("New file ready");'; }
        else initContent = '# New content';
        files[fname] = { name: fname, language: lang, content: initContent };
        refreshUI();
        switchToFile(fname);
        addConsoleMessage('log', [`➕ Created ${fname}`]);
    }

    function openFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.html,.css,.js,.txt';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const content = ev.target.result;
                const filename = file.name;
                const ext = filename.split('.').pop();
                let lang = 'plaintext';
                if (ext === 'html') lang = 'html';
                else if (ext === 'css') lang = 'css';
                else if (ext === 'js') lang = 'javascript';
                files[filename] = { name: filename, language: lang, content: content };
                refreshUI();
                switchToFile(filename);
                addConsoleMessage('log', [`📂 Opened ${filename}`]);
            };
            reader.readAsText(file);
        };
        input.click();
    }

    // ---- CONSOLE OVERRIDE (captures logs, errors, warns) ----
    const originalConsole = { log: console.log, error: console.error, warn: console.warn };
    function addConsoleMessage(type, args) {
        const consoleDiv = document.getElementById('console-output');
        if (!consoleDiv) return;
        const message = args.map(arg => {
            if (arg === undefined) return 'undefined';
            if (typeof arg === 'object') {
                try { return JSON.stringify(arg, null, 2); } catch(e) { return String(arg); }
            }
            return String(arg);
        }).join(' ');
        const line = document.createElement('div');
        line.className = `console-line console-${type}`;
        line.textContent = `› ${message}`;
        consoleDiv.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function overrideGlobalConsole() {
        console.log = function(...args) { originalConsole.log.apply(console, args); addConsoleMessage('log', args); };
        console.error = function(...args) { originalConsole.error.apply(console, args); addConsoleMessage('error', args); };
        console.warn = function(...args) { originalConsole.warn.apply(console, args); addConsoleMessage('warn', args); };
    }

    // ---- CORE: RUN CODE - FULLY FUNCTIONAL LIVE PREVIEW ----
    function runCode() {
        // Save current editor content before running
        if (editor && monacoReady) {
            files[currentFile].content = editor.getValue();
        }
        
        // Build complete HTML document from all files
        let htmlContent = '';
        const hasIndex = files['index.html'];
        
        if (hasIndex) {
            // Use index.html as base, but inject CSS/JS properly if referenced?
            // Simple approach: take index.html content and ensure styles/scripts are replaced or embedded
            let baseHtml = files['index.html'].content;
            // We'll create a full standalone document from all pieces
            // But to guarantee all changes reflect, we'll construct a full document that includes current CSS and JS
            const cssContent = files['styles.css'] ? files['styles.css'].content : '';
            const jsContent = files['script.js'] ? files['script.js'].content : '';
            
            // Parse or inject: we can generate a fresh document that merges everything
            // This ensures live preview shows current CSS/JS even if not linked properly in HTML
            let finalHtml = baseHtml;
            // If there's a <link rel="stylesheet" href="styles.css">, replace with embedded style
            if (cssContent) {
                // Replace or inject style tag
                const styleTag = `<style id="live-styles">\n${cssContent}\n</style>`;
                if (finalHtml.includes('</head>')) {
                    finalHtml = finalHtml.replace('</head>', `${styleTag}\n</head>`);
                } else if (finalHtml.includes('<head>')) {
                    finalHtml = finalHtml.replace('<head>', `<head>\n${styleTag}`);
                } else {
                    finalHtml = `<head>${styleTag}</head>${finalHtml}`;
                }
                // Remove external link to avoid duplication (optional)
                finalHtml = finalHtml.replace(/<link[^>]*styles\.css[^>]*>/gi, '');
            }
            
            if (jsContent) {
                const scriptTag = `<script id="live-script">\n${jsContent}\n<\/script>`;
                if (finalHtml.includes('</body>')) {
                    finalHtml = finalHtml.replace('</body>', `${scriptTag}\n</body>`);
                } else if (finalHtml.includes('</html>')) {
                    finalHtml = finalHtml.replace('</html>', `${scriptTag}\n</html>`);
                } else {
                    finalHtml += scriptTag;
                }
                // Remove external script src to avoid double execution
                finalHtml = finalHtml.replace(/<script[^>]*src="script\.js"[^>]*>[\s\S]*?<\/script>/gi, '');
            }
            
            htmlContent = finalHtml;
        } else {
            // No index.html, create a dynamic page using current CSS/JS
            const cssRaw = files['styles.css']?.content || '';
            const jsRaw = files['script.js']?.content || '';
            htmlContent = `<!DOCTYPE html>
            <html>
            <head><meta charset="UTF-8"><title>Live Preview</title><style>${cssRaw}</style></head>
            <body><div id="app-root" style="padding:20px"><h2>Dynamic Preview</h2><p>No index.html, using CSS + JS</p><button id="dynamicBtn">Test JS</button><p id="dynamicMsg"></p></div>
            <script>
                ${jsRaw}
                if(document.getElementById('dynamicBtn')) {
                    document.getElementById('dynamicBtn').addEventListener('click', () => {
                        const msg = document.getElementById('dynamicMsg');
                        if(msg) msg.innerText = 'JavaScript works!';
                        console.log('Dynamic button clicked');
                    });
                }
            <\/script>
            </body></html>`;
        }
        
        // Create iframe and inject HTML
        const previewContainer = document.getElementById('panelContent');
        // Clear panel and show iframe
        const iframe = document.createElement('iframe');
        iframe.className = 'preview-frame';
        iframe.sandbox = 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals';
        iframe.srcdoc = htmlContent;
        
        previewContainer.innerHTML = '';
        previewContainer.appendChild(iframe);
        
        // Switch to output panel automatically
        switchPanel('output');
        
        // Also log to console that execution occurred
        addConsoleMessage('log', ['🚀 Code executed! Live preview updated.']);
        
        // Capture console logs from iframe? Not necessary because we are overriding main page console,
        // but the iframe runs its own context. However user can still see preview behavior.
        // We'll also display message
    }

    function formatCode() {
        if (editor && editor.getAction) {
            editor.getAction('editor.action.formatDocument').run();
            addConsoleMessage('log', ['✨ Formatted document']);
        } else {
            addConsoleMessage('warn', ['Formatting not available yet']);
        }
    }

    function toggleConsolePanel() {
        const panel = document.getElementById('bottomPanel');
        panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
    }

    function switchPanel(panelId) {
        const panelDiv = document.getElementById('panelContent');
        const tabs = document.querySelectorAll('.panel-tab');
        tabs.forEach(t => t.classList.remove('active'));
        const activeTab = Array.from(tabs).find(t => t.getAttribute('data-panel') === panelId);
        if (activeTab) activeTab.classList.add('active');
        
        if (panelId === 'console') {
            if (!document.getElementById('console-output')) {
                panelDiv.innerHTML = '<div id="console-output"></div>';
            } else {
                const consoleElem = document.getElementById('console-output');
                panelDiv.innerHTML = '';
                panelDiv.appendChild(consoleElem);
            }
        } else if (panelId === 'output') {
            panelDiv.innerHTML = '<div style="display:flex; align-items:center; justify-content:center; height:100%; color:#aaa;"><i class="fas fa-play-circle"></i> Press "Run Code" to see live preview</div>';
        } else if (panelId === 'problems') {
            panelDiv.innerHTML = '<div style="padding:12px"><i class="fas fa-info-circle"></i> Monaco diagnostics active. Check editor for syntax hints.</div>';
        }
    }

    function updateCursorPosition() {
        if (editor) {
            const pos = editor.getPosition();
            if (pos) document.getElementById('cursorPosition').innerText = `Ln ${pos.lineNumber}, Col ${pos.column}`;
        }
    }

    // GitHub mocks
    function pushToGitHub() {
        document.getElementById('modalTitle').innerHTML = '🚀 Push to GitHub';
        document.getElementById('modalTitle').dataset.action = 'push';
        document.getElementById('githubModal').style.display = 'flex';
    }
    function cloneFromGitHub() {
        document.getElementById('modalTitle').innerHTML = '📥 Clone Repository';
        document.getElementById('modalTitle').dataset.action = 'clone';
        document.getElementById('githubModal').style.display = 'flex';
    }
    function performGitHubAction() {
        const action = document.getElementById('modalTitle').dataset.action;
        const repo = document.getElementById('repoUrl').value.trim();
        if (!repo) { addConsoleMessage('error', ['Repository name required']); closeModal(); return; }
        if (action === 'push') {
            window.open(`https://github.com/new?repository_name=${encodeURIComponent(repo)}`, '_blank');
            addConsoleMessage('log', [`Opening GitHub new repo: ${repo}`]);
        } else {
            addConsoleMessage('log', [`Clone simulation: ${repo}`]);
        }
        closeModal();
    }
    function closeModal() { document.getElementById('githubModal').style.display = 'none'; document.getElementById('repoUrl').value = ''; document.getElementById('commitMessage').value = ''; }
    function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    function showSettings() { addConsoleMessage('log', ['⚙️ Settings panel coming soon']); }

    // Monaco initialization
    function initMonaco() {
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], () => {
            monacoReady = true;
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: files[currentFile].content,
                language: files[currentFile].language,
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                minimap: { enabled: true },
                scrollBeyondLastLine: false,
                lineNumbers: 'on',
                bracketPairColorization: { enabled: true }
            });
            editor.onDidChangeCursorPosition(() => updateCursorPosition());
            editor.onDidChangeModelContent(() => {
                if (files[currentFile]) files[currentFile].content = editor.getValue();
            });
            refreshUI();
            overrideGlobalConsole();
            addConsoleMessage('log', ['✅ Monaco ready. Click RUN to see live preview!']);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        initMonaco();
        refreshUI();
        switchPanel('console');
    });
</script>
</body>
</html>
